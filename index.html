<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我家小店 - 欢迎光临</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shop-name {
            font-size: 26px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 32px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-douyin {
            background: linear-gradient(90deg, #1a1a1a, #333333);
            color: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .btn-douyin:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.35); }
        .btn-meituan {
            background: linear-gradient(90deg, #FFC300, #FFD93D);
            color: #333;
            box-shadow: 0 6px 20px rgba(255,195,0,0.35);
        }
        .btn-meituan:hover { box-shadow: 0 8px 25px rgba(255,195,0,0.45); }
        .btn-dianping {
            background: linear-gradient(90deg, #FF6633, #FF3333);
            color: #fff;
            box-shadow: 0 6px 20px rgba(255,102,51,0.35);
        }
        .btn-dianping:hover { box-shadow: 0 8px 25px rgba(255,102,51,0.45); }
        .tips {
            margin-top: 24px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
            color: #7f8c8d;
            line-height: 1.6;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #bdc3c7;
        }
        .arrow {
            margin-left: auto;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="shop-name">我家小店</div>
        <div class="subtitle">欢迎光临 · 点击跳转对应平台</div>
        <a href="https://v.douyin.com/xN6tkECo2cE" class="btn btn-douyin">
            <span class="btn-icon">🎵</span>
            <span>抖音</span>
            <span class="arrow">›</span>
        </a>
        <a href="http://dpurl.cn/G5EfCE7z" class="btn btn-meituan">
            <span class="btn-icon">🥡</span>
            <span>美团</span>
            <span class="arrow">›</span>
        </a>
        <a href="https://m.dianping.com/shopinfo/l7LSWsEP5oZ2Jdpk?msource=Appshare2021&utm_source=shop_share&shoptype=10&shopcategoryid=4447&cityid=99&isoversea=0" class="btn btn-dianping">
            <span class="btn-icon">⭐</span>
            <span>大众点评</span>
            <span class="arrow">›</span>
        </a>
        <div class="tips">
            💡 提示：若部分平台链接在微信内无法直接打开，可点击右上角「···」选择在浏览器中打开。
        </div>
        <div class="footer">长按识别二维码 · 访问本店聚合页</div>
    </div>
</body>
</html>
